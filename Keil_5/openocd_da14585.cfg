# OpenOCD config for DA14585/586 (Cortex-M0) via CMSIS-DAP + SWD.
# Loads the built .axf into system RAM at 0x07fc0000 and runs it
# (equivalent to Keil's "debug session" RAM-load-and-run).
#
# Usage:
#   openocd -f openocd_da14585.cfg -c "ram_load_run out_DA14585/Objects/ble_app_peripheral_585.axf" -c shutdown
#
# Note: on this chip, RAM is not cleared by a core-only reset (SYSRESETREQ),
# and the ROM's SPI-flash boot copy only runs on a real power-on-reset -- not
# on SYSRESETREQ. So "reset halt" just re-triggers the CPU's normal vector
# fetch from 0x07fc0000, using whatever is currently in RAM. That means we
# can safely: halt, overwrite RAM with our new image, and take over SP/PC
# ourselves, with no race against any boot-time DMA copy.

source [find interface/cmsis-dap.cfg]

adapter speed 1000

transport select swd

# DA14585/586 is a single Cortex-M0 core, standard ARM CoreSight SW-DP (IDCODE 0x0BB11477).
set _CHIPNAME da14585
swd newdap $_CHIPNAME cpu -expected-id 0x0bb11477
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap

# DA1458x has no internal flash bank OpenOCD can program (firmware runs from
# RAM; persistence to external SPI flash/OTP is done by the app itself or by
# SmartSnippets, not by OpenOCD). Do not define a flash bank here.

$_CHIPNAME.cpu configure -work-area-phys 0x07fc0000 -work-area-size 0x10000 -work-area-backup 0

init

$_CHIPNAME.cpu cortex_m reset_config sysresetreq

proc ram_load_run {filename} {
    reset halt
    load_image $filename

    # Vector table at 0x07fc0000: word0 = initial SP, word1 = Reset_Handler PC.
    set vt [read_memory 0x07fc0000 32 2]
    reg sp [lindex $vt 0]
    reg pc [lindex $vt 1]

    echo [format "Loaded %s -- SP=0x%08x PC=0x%08x, resuming" $filename [lindex $vt 0] [lindex $vt 1]]
    resume
}
